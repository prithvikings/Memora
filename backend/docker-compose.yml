version: "3.8"

services:
  # 1. The Express API Gateway
  api:
    build: .
    container_name: bookmark_api
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=development
      - MONGO_URI=mongodb://mongodb:27017/ai-bookmarks
      - REDIS_URI=redis://redis:6379
      - ELASTIC_NODE=http://elasticsearch:9200
      - JWT_SECRET=super_secret_jwt_key_for_local_dev
      - GEMINI_API_KEY=${GEMINI_API_KEY} # Pulls from your host machine's .env
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started
      elasticsearch:
        condition: service_healthy

  # 2. The BullMQ Worker (Uses the same build, just a different command!)
  worker:
    build: .
    container_name: bookmark_worker
    command: npm run dev:worker # Overrides the default CMD in Dockerfile
    environment:
      - NODE_ENV=development
      - MONGO_URI=mongodb://mongodb:27017/ai-bookmarks
      - REDIS_URI=redis://redis:6379
      - ELASTIC_NODE=http://elasticsearch:9200
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started
      elasticsearch:
        condition: service_healthy

  # 3. MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: bookmark_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 4. Redis (For BullMQ)
  redis:
    image: redis:7-alpine
    container_name: bookmark_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # 5. Elasticsearch (For Vector/Hybrid Search)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: bookmark_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false # Disabled for local dev ease; enable in prod!
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

# Persistent storage so your data doesn't wipe when you stop Docker
volumes:
  mongo_data:
  redis_data:
  es_data:

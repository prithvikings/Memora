version: "3.8"

services:
  # 1. MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: bookmark_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Redis (For BullMQ)
  redis:
    image: redis:7-alpine
    container_name: bookmark_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # 3. Elasticsearch (For Vector/Hybrid Search)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: bookmark_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false 
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
  redis_data:
  es_data:
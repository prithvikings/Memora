<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Memora</title>
    <link rel="stylesheet" href="popup.css" />
    <style>
      body {
        width: 320px;
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }
      /* Prevent a weird Chrome rendering bug where the popup is too small initially */
      html {
        min-height: 200px;
      }
    </style>
  </head>
  <body class="bg-gray-50 text-gray-900 flex flex-col h-full">
    <header class="p-4 border-b bg-white">
      <h1 class="font-bold text-lg tracking-tight">Memora</h1>
    </header>

    <main class="p-4 flex-1 flex flex-col gap-4">
      <div id="auth-warning" class="hidden flex flex-col gap-2">
        <p class="text-sm text-red-600 font-medium">You are not logged in.</p>
        <a
          href="http://localhost:3000/login"
          target="_blank"
          class="text-sm text-blue-600 hover:underline"
          >Log in to dashboard</a
        >
      </div>

      <div id="app-content" class="hidden flex flex-col gap-4">
        <div class="flex flex-col gap-1">
          <label class="text-xs font-bold text-gray-500 uppercase"
            >Saving URL</label
          >
          <div
            id="current-url"
            class="text-sm truncate text-gray-700 bg-gray-100 p-2 rounded border"
          >
            Loading...
          </div>
        </div>

        <div class="flex flex-col gap-1">
          <label class="text-xs font-bold text-gray-500 uppercase"
            >Collection</label
          >
          <select
            id="collection-select"
            class="w-full text-sm border rounded p-2 bg-white outline-none focus:border-blue-500"
          >
            <option value="">Unorganized (Root)</option>
          </select>
        </div>

        <button
          id="save-btn"
          class="w-full bg-blue-600 text-white font-semibold py-2 rounded-md hover:bg-blue-700 transition-colors mt-2"
        >
          Save Bookmark
        </button>

        <div
          id="status-msg"
          class="text-sm text-center font-medium hidden"
        ></div>
      </div>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
